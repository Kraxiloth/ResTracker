<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ============================================================
       PWA / MOBILE META TAGS
       ============================================================ -->

  <!-- Primary -->
  <title>ResTracker</title>
  <meta name="description" content="A companion app for Sorcery: Contested Realm" />
  <meta name="theme-color" content="#c9a84c" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ResTracker" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />

  <!-- ============================================================
       STYLES
       base.css loaded first — provides CSS custom properties
       before any content renders, preventing a flash of
       unstyled / wrong-theme content.
       ============================================================ -->
  <link rel="stylesheet" href="styles/base.css" />

  <!-- ============================================================
       CONFIG
       Must load before app.js so APP_CONFIG is available
       when the bootstrapper runs.
       ============================================================ -->
  <script src="config.js"></script>
</head>

<body>

  <!-- ============================================================
       APP SHELL
       #app is the CSS grid container defined in base.css.
       grid-template-areas: header | content | nav
       ============================================================ -->
  <div id="app">

    <!-- ==================== HEADER ==================== -->
    <header id="app-header" role="banner">
      <span class="app-title">ResTracker</span>
    </header>
    <!-- End header -->

    <!-- ==================== TIMER BAR ==================== -->
    <div id="timer-bar" class="timer-bar hidden" aria-live="polite">
      <div class="timer__player">
        <span class="timer__name" id="timer-you-name">You</span>
        <span class="timer__value font-mono" id="timer-you">0:00</span>
      </div>
      <div class="timer__divider"></div>
      <div class="timer__player">
        <span class="timer__name" id="timer-opp-name">Opponent</span>
        <span class="timer__value font-mono" id="timer-opp">0:00</span>
      </div>
    </div>
    <!-- End timer bar -->


    <!-- ==================== CONTENT ==================== -->
    <main id="app-content" role="main">

      <!-- --------------------------------------------------
           VIEW: GAME
           Life, mana and threshold counters.
           Shown by default — first nav item.
           -------------------------------------------------- -->
      <section
        id="view-game"
        class="view"
        role="tabpanel"
        aria-label="Game"
      >
        <!-- Game feature module will populate this -->
      </section>


      <!-- --------------------------------------------------
           VIEW: LOG
           Game event log.
           -------------------------------------------------- -->
      <section
        id="view-log"
        class="view"
        role="tabpanel"
        aria-label="Log"
      >
        <!-- Log feature module will populate this -->
      </section>


      <!-- --------------------------------------------------
           VIEW: STATS
           Game statistics.
           -------------------------------------------------- -->
      <section
        id="view-stats"
        class="view"
        role="tabpanel"
        aria-label="Stats"
      >
        <!-- Stats feature module will populate this -->
      </section>


      <!-- --------------------------------------------------
           VIEW: SETTINGS
           Theme switcher and app preferences.
           -------------------------------------------------- -->
      <section
        id="view-settings"
        class="view"
        role="tabpanel"
        aria-label="Settings"
      >
        <!-- Settings feature module will populate this -->
      </section>

    </main>
    <!-- End content -->


    <!-- ==================== BOTTOM NAV ==================== -->
    <nav id="app-nav" role="tablist" aria-label="Main navigation">

      <!-- Game -->
      <button
        class="nav-item"
        role="tab"
        data-view="view-game"
        aria-selected="false"
        aria-controls="view-game"
      >
        <svg class="nav-item__icon" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Shield icon — represents the game / combat screen -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
            d="M12 3L4 7v5c0 4.418 3.358 8.563 8 9.93C17.642 20.563 21 16.418 21 12V7l-9-4z" />
        </svg>
        <span>Game</span>
      </button>

      <!-- Log -->
      <button
        class="nav-item"
        role="tab"
        data-view="view-log"
        aria-selected="false"
        aria-controls="view-log"
      >
        <svg class="nav-item__icon" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Scroll icon — represents the game log -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
        </svg>
        <span>Log</span>
      </button>

      <!-- Stats -->
      <button
        class="nav-item"
        role="tab"
        data-view="view-stats"
        aria-selected="false"
        aria-controls="view-stats"
      >
        <svg class="nav-item__icon" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Bar chart icon — represents statistics -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span>Stats</span>
      </button>

      <!-- Settings -->
      <button
        class="nav-item"
        role="tab"
        data-view="view-settings"
        aria-selected="false"
        aria-controls="view-settings"
      >
        <svg class="nav-item__icon" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Gear icon — represents settings -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" />
        </svg>
        <span>Settings</span>
      </button>

    </nav>
    <!-- End nav -->

  </div>
  <!-- End #app -->


  <!-- ============================================================
       SCRIPTS
       app.js deferred — runs after DOM is parsed.
       Feature modules will be added here as they are built.
       ============================================================ -->
  <script src="js/timer.js" defer></script>
  <script src="js/game.js" defer></script>
  <script src="js/log.js" defer></script>
  <script src="js/stats.js" defer></script>
  <script src="js/settings.js" defer></script>
  <script src="app.js" defer></script>

</body>
</html>
